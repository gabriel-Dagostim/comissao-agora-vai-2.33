<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ app_title }}</title>
    <script>
      (function(){
        var t = localStorage.getItem('comissao-app-theme');
        document.documentElement.setAttribute('data-theme', (t === 'dark' || t === 'light') ? t : 'light');
      })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
  </head>
  <body class="min-vh-100 d-flex flex-column">
    <nav class="navbar navbar-light bg-light">
      <div class="container-fluid">
        <div class="d-flex align-items-center gap-3">
          <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Farmácias Estrela" class="navbar-logo" height="40" onerror="this.style.display='none'"/>
          <a class="navbar-brand" href="{{ url_for('index') }}">{{ app_title }}</a>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button type="button" class="btn btn-theme-toggle" id="themeToggle" aria-label="Alternar tema claro/escuro" title="Alternar tema">
            <span class="theme-icon theme-icon--sun" aria-hidden="true">☀</span>
            <span class="theme-icon theme-icon--moon" aria-hidden="true">🌙</span>
          </button>
          <a class="btn btn-outline-dark btn-sm" href="{{ url_for('index') }}">Nova consulta</a>
        </div>
      </div>
    </nav>

    <main class="container my-4 flex-fill">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>

    <footer class="footer py-3 mt-auto">
      <div class="container text-center small">
        Desenvolvido por <strong>Alex Vauna</strong>
      </div>
    </footer>
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
  </body>
</html>
